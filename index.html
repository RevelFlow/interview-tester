<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Coach — Herd Consulting</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e0d;
    --surface: #181714;
    --surface2: #201e1b;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ebe3;
    --muted: #8a8378;
    --accent: #d4a85a;
    --accent-dim: rgba(212,168,90,0.12);
    --green: #6dbf8a;
    --green-dim: rgba(109,191,138,0.1);
    --red: #e07070;
    --red-dim: rgba(224,112,112,0.1);
    --amber: #e8b84a;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; }

  .app { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem 4rem; min-height: 100vh; }

  header { text-align: center; padding: 2.5rem 0 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
  header .eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; }
  header h1 { font-family: 'Instrument Serif', serif; font-size: 2rem; font-weight: 400; color: var(--text); letter-spacing: -0.01em; }
  header h1 em { color: var(--accent); font-style: italic; }
  header p { color: var(--muted); font-size: 13px; margin-top: 0.5rem; max-width: 460px; margin-left: auto; margin-right: auto; }

  .session-bar { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 1.5rem; font-size: 13px; color: var(--muted); }
  .session-bar .q-count { font-family: 'DM Mono', monospace; color: var(--accent); font-size: 12px; }
  .session-bar .avg { display: flex; align-items: center; gap: 6px; }
  .stars-mini { color: var(--accent); font-size: 12px; letter-spacing: 1px; }

  .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1.25rem; position: relative; overflow: hidden; }
  .question-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), transparent); }
  .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .q-tag { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; padding: 3px 8px; border-radius: 4px; background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(212,168,90,0.2); }
  .q-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .question-text { font-family: 'Instrument Serif', serif; font-size: 1.25rem; font-weight: 400; line-height: 1.5; color: var(--text); }

  .answer-area { position: relative; margin-bottom: 1rem; }
  textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.7; resize: vertical; min-height: 140px; outline: none; transition: border-color 0.2s; }
  textarea:focus { border-color: var(--border2); }
  textarea::placeholder { color: var(--muted); }
  .char-count { text-align: right; font-size: 11px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }

  .mic-btn { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--border2); background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .mic-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
  .mic-btn.recording { border-color: var(--red); background: var(--red-dim); animation: mic-pulse 1s infinite; }
  .mic-btn svg { width: 18px; height: 18px; }
  .mic-btn.recording svg { stroke: var(--red); }
  .mic-btn:not(.recording) svg { stroke: var(--muted); }
  @keyframes mic-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(224,112,112,0.3); } 50% { box-shadow: 0 0 0 6px rgba(224,112,112,0); } }
  .voice-status { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); margin-left: 4px; }
  .voice-status.active { color: var(--red); }
  .input-row { display: flex; align-items: flex-start; gap: 10px; }
  .input-row textarea { flex: 1; }

  .btn-row { display: flex; gap: 10px; align-items: center; }
  .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #1a1510; }
  .btn-primary:hover { background: #e0b96a; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-sm { padding: 7px 14px; font-size: 13px; }

  .thinking { display: flex; align-items: center; gap: 10px; padding: 1rem; color: var(--muted); font-size: 13px; }
  .dots span { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s infinite; margin: 0 2px; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

  .feedback-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 1.25rem; }
  .feedback-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .feedback-header .label { font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .score-display { display: flex; align-items: center; gap: 10px; }
  .score-num { font-family: 'Instrument Serif', serif; font-size: 1.6rem; color: var(--text); }
  .score-bar { width: 80px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
  .stars { font-size: 14px; letter-spacing: 2px; }

  .feedback-body { padding: 1.25rem 1.5rem; }
  .feedback-section { margin-bottom: 1.25rem; }
  .feedback-section:last-child { margin-bottom: 0; }
  .fs-label { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
  .fs-label.good { color: var(--green); }
  .fs-label.improve { color: var(--red); }
  .fs-label.suggest { color: var(--accent); }
  .fs-content { font-size: 13.5px; color: #c8c0b4; line-height: 1.7; }
  .fs-content ul { padding-left: 1.2rem; }
  .fs-content ul li { margin-bottom: 0.3rem; }

  .verdict { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .verdict.strong { background: var(--green-dim); color: var(--green); border: 1px solid rgba(109,191,138,0.2); }
  .verdict.good { background: rgba(109,191,138,0.07); color: #8ecba6; border: 1px solid rgba(109,191,138,0.15); }
  .verdict.fair { background: rgba(232,184,74,0.08); color: var(--amber); border: 1px solid rgba(232,184,74,0.2); }
  .verdict.weak { background: var(--red-dim); color: var(--red); border: 1px solid rgba(224,112,112,0.2); }

  .next-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .history { margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem; }
  .history-title { font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1rem; }
  .history-item { display: flex; align-items: flex-start; gap: 12px; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
  .history-item:last-child { border-bottom: none; }
  .hi-q { font-size: 13px; color: var(--muted); flex: 1; line-height: 1.5; }
  .hi-score { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); flex-shrink: 0; }

  .start-panel { text-align: center; padding: 2.5rem 1rem; }
  .start-panel p { color: var(--muted); font-size: 14px; max-width: 400px; margin: 0 auto 1.5rem; line-height: 1.7; }
  .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .cat-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; cursor: pointer; text-align: left; transition: all 0.15s; color: var(--text); font-family: 'DM Sans', sans-serif; }
  .cat-btn:hover { border-color: var(--border2); background: var(--surface2); }
  .cat-btn.selected { border-color: var(--accent); background: var(--accent-dim); }
  .cat-btn .cat-name { font-size: 13px; font-weight: 500; display: block; margin-bottom: 2px; }
  .cat-btn .cat-desc { font-size: 11px; color: var(--muted); }

  .hidden { display: none; }

  /* TTS toggle */
  .tts-toggle { display: flex; align-items: center; gap: 7px; cursor: pointer; }
  .tts-toggle input[type=checkbox] { display: none; }
  .tgl-track { width: 30px; height: 17px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 9px; position: relative; transition: background 0.2s, border-color 0.2s; flex-shrink: 0; }
  .tgl-track::after { content: ''; position: absolute; width: 11px; height: 11px; background: var(--muted); border-radius: 50%; top: 2px; left: 2px; transition: transform 0.2s, background 0.2s; }
  .tts-toggle input:checked + .tgl-track { background: var(--accent-dim); border-color: rgba(212,168,90,0.4); }
  .tts-toggle input:checked + .tgl-track::after { transform: translateX(13px); background: var(--accent); }
  .tgl-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }

  /* Speaker buttons */
  .speak-btn { background: none; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; color: var(--muted); padding: 3px 8px; line-height: 1; transition: all 0.15s; display: inline-flex; align-items: center; gap: 4px; font-family: 'DM Mono', monospace; font-size: 11px; }
  .speak-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Custom questions panel */
  .custom-panel { margin-top: 1.25rem; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; text-align: left; }
  .custom-panel-hdr { width: 100%; background: var(--surface); border: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 0.7rem 1rem; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
  .custom-panel-hdr:hover { background: var(--surface2); }
  .cph-left { display: flex; align-items: center; gap: 8px; }
  .cph-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(212,168,90,0.2); padding: 1px 7px; border-radius: 10px; }
  .cph-chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
  .cph-chevron.open { transform: rotate(180deg); }
  .custom-panel-body { padding: 1rem; border-top: 1px solid var(--border); background: var(--surface); }
  .cpb-form { margin-bottom: 1rem; }
  .cpb-form textarea { width: 100%; margin-bottom: 0.5rem; resize: vertical; min-height: 70px; }
  .cpb-form-row { display: flex; gap: 8px; align-items: center; }
  .cpb-form-row select { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; }
  .cpb-form-row select:focus { border-color: var(--border2); }
  .cq-item { display: flex; align-items: flex-start; gap: 8px; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
  .cq-item:last-child { border-bottom: none; }
  .cq-cat { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(212,168,90,0.2); padding: 2px 6px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .cq-text { font-size: 13px; color: var(--muted); flex: 1; line-height: 1.5; }
  .cq-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; padding: 0 2px; flex-shrink: 0; }
  .cq-del:hover { color: var(--red); }
  .cq-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 0.75rem 0; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow">Herd Consulting · Interview Prep</div>
    <h1>Interview <em>Coach</em></h1>
    <p>Practise answering questions using your real experience. Honest feedback, every time.</p>
  </header>

  <div id="start-panel" class="start-panel">
    <p>Choose a focus area or go with a random mix. Questions are drawn from your actual CV and work examples.</p>
    <div class="category-grid">
      <button class="cat-btn selected" data-cat="mixed" onclick="selectCat(this)">
        <span class="cat-name">Mixed bag</span>
        <span class="cat-desc">Random selection</span>
      </button>
      <button class="cat-btn" data-cat="competency" onclick="selectCat(this)">
        <span class="cat-name">Competency</span>
        <span class="cat-desc">STAR-format examples</span>
      </button>
      <button class="cat-btn" data-cat="motivation" onclick="selectCat(this)">
        <span class="cat-name">Motivation</span>
        <span class="cat-desc">Why Herd, why now</span>
      </button>
      <button class="cat-btn" data-cat="technical" onclick="selectCat(this)">
        <span class="cat-name">BA craft</span>
        <span class="cat-desc">Process, methods, tools</span>
      </button>
      <button class="cat-btn" data-cat="culture" onclick="selectCat(this)">
        <span class="cat-name">Culture fit</span>
        <span class="cat-desc">Values, startup, team</span>
      </button>
      <button class="cat-btn" data-cat="challenge" onclick="selectCat(this)">
        <span class="cat-name">Challenges</span>
        <span class="cat-desc">Difficult situations</span>
      </button>
      <button class="cat-btn" id="cat-btn-custom" data-cat="custom" onclick="selectCat(this)">
        <span class="cat-name">My Questions</span>
        <span class="cat-desc" id="custom-cat-desc">0 saved</span>
      </button>
    </div>

    <div class="custom-panel">
      <button class="custom-panel-hdr" onclick="toggleCustomPanel()">
        <span class="cph-left">My Questions <span class="cph-count" id="cph-count">0</span></span>
        <span class="cph-chevron" id="cph-chevron">▾</span>
      </button>
      <div id="custom-panel-body" class="hidden">
        <div class="custom-panel-body">
          <div class="cpb-form">
            <textarea id="custom-q-input" placeholder="Paste or type an interview question..." rows="3"></textarea>
            <div class="cpb-form-row">
              <select id="custom-q-cat">
                <option value="mixed">Mixed / General</option>
                <option value="competency">Competency</option>
                <option value="motivation">Motivation</option>
                <option value="technical">BA Craft</option>
                <option value="culture">Culture Fit</option>
                <option value="challenge">Challenge</option>
              </select>
              <button class="btn btn-primary btn-sm" onclick="addCustomQuestion()">Add →</button>
            </div>
          </div>
          <div id="custom-q-list"></div>
        </div>
      </div>
    </div>

    <div style="margin-top:1.5rem">
      <button class="btn btn-primary" onclick="startSession()">Start session →</button>
    </div>
  </div>

  <div id="session-panel" class="hidden">
    <div class="session-bar">
      <label class="tts-toggle" title="Auto-read questions and feedback aloud">
        <input type="checkbox" id="tts-toggle" onchange="toggleAutoRead(this.checked)">
        <span class="tgl-track"></span>
        <span class="tgl-label">Read aloud</span>
      </label>
      <span class="q-count" id="q-count">Question 1</span>
      <span class="avg" id="avg-display" style="display:none">
        Avg: <span class="stars-mini" id="avg-stars">—</span>
      </span>
    </div>

    <div id="question-area"></div>
    <div id="feedback-area"></div>
    <div id="next-row" class="next-row hidden">
      <button class="btn btn-primary" onclick="nextQuestion()">Next question →</button>
      <button class="btn btn-ghost btn-sm" onclick="retryQuestion()">Try again ↩</button>
      <button class="btn btn-ghost btn-sm" onclick="endSession()">End session</button>
    </div>
    <div id="history-area" class="hidden history">
      <div class="history-title">This session</div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<script>
(function() {
  const stored = sessionStorage.getItem('auth');
  if (stored !== 'ok') {
    const pw = prompt('Enter password:');
    if (pw !== 'herd2026') {
      document.body.innerHTML = '<p style="color:#f0ebe3;font-family:sans-serif;padding:2rem">Incorrect password.</p>';
      throw new Error('Unauthorised');
    }
    sessionStorage.setItem('auth', 'ok');
  }
})();

const CONTEXT = `You are an interview coach helping Benjy Curzon-Jones prepare for an interview at Herd Consulting for a Consultant Business Analyst role.

ABOUT BENJY:
- BA with ~10 years experience across higher education (Sheffield Hallam University), telecoms (Plusnet/BT), automotive retail (Lithia UK), manufacturing (Synseal)
- Current role: Transformation Analyst at Lithia UK (2025-present) - built efficiency models from live dealership data identifying 1M hours repurposable capacity = £50M gross profit opportunity, tracked £25M+ benefits portfolio, influenced UK and US senior leadership securing £2M+ investment
- Sheffield Hallam University (2021-2025): Led CRM implementation (Microsoft Dynamics 365) for student recruitment. Key work:
  * Functional Module framework (blend of SIPOC + process maps) for requirements workshops with no prior documentation
  * Event booking forms with 300+ sessions, validation logic, travel time logic
  * QR code scanning PowerApp for event check-in
  * Offer comms solution (STA/SCO/TEX) using 3 custom fields as conditional triggers
  * Full artefact suite: process maps, user stories, data models, integration maps, test plans
  * UAT lead: test scripts, defect management, 70 staff users
  * SITS to D365 integration mapping (full data dictionary, 2-week initial transfer)
  * De-duplication study (root cause analysis, 20% time saving for 2 employees)
  * Unique email address options report (removed ~700 new dupes/month)
  * Event Forms wireframes built in Miro when UI designer stalled for months
  * Options report for forms rebuild (PHP vs .NET, ~£300k decision) - Benjy's suggestion overruled, accepted gracefully
  * Benefits case for CRM enhancements, presented to senior staff
  * Subject Area OLP Split - coordinated cross-system switchover
  * General Supplier Engagement plan - adopted by DTS team
  * JIRA ticket creation guidelines - standardised across digital team
  * Data integration mapping for reporting (CRM to data warehouse via staging DB)
  * COVID data project requirements
  * AWRC Active Together programme - additional process mapping work done alongside full-time CRM role
  * Sitecore Forms - front-end to backend mapping
- Plusnet/BT (2018-2021): £25M+ transformation programme, customer journey mapping, VMOST alignment, Data Insights Champion
- Synseal (2016-2018): Lean/Six Sigma Green Belt, stepped in to cover logistics planning at short notice for 3 months, £120k board-secured investment from zero-base stillage model, £150k savings, £200k overnight glass shunt savings
- Education: PhD Sports & Exercise Science (Birmingham, funded by Age UK), BSc 2:1, BCS Foundation Certificate in Business Analysis, Lean Six Sigma Green Belt
- Lives in Sheffield, keen mountain biker, cave camper, runner, climber, singer-songwriter, forager, runs Revel Threads (festival clothing business)

ABOUT HERD:
- Consultancy focused on social mission clients: Police, Government, Local Authorities, Higher Education, Charities
- Grew from ~10 to 40+ people in ~1 year, mainly BAs and Product Owners
- Named Sunday Times Best Places to Work 2024 and 2025
- Based in Sheffield, hybrid working
- "Power of Herd" team culture, "non-consultancy vibes"
- Salary £42k-£52k
- JD emphasises: outcomes over process, long-term client relationships, pragmatic delivery, all-rounder who gets stuck in, able to challenge clients constructively, commercially aware, lifelong learner

YOUR ROLE: Ask ONE interview question, then when Benjy answers, give honest, direct feedback.

When giving feedback, structure it as JSON with these exact fields:
{
  "score": <integer 1-10>,
  "verdict": "<one of: Strong, Good, Fair, Weak>",
  "what_worked": "<2-3 sentences on genuine strengths of the answer>",
  "what_missed": "<specific things that were absent, vague, or weak - be direct, don't sugarcoat>",
  "better_version": "<a concrete suggestion: either a specific example Benjy should have used, or 2-3 sentences showing how to improve the structure/content>",
  "tip": "<one sharp, memorable tactical tip>"
}

IMPORTANT CONTEXT: This is an INFORMAL first interview — more of a conversation than a formal panel. Herd's culture is relaxed and human. Answers do not need rigid STAR structure; what matters is that the content is clear, grounded in real experience, and shows genuine self-awareness. Conversational, natural answers are fine — even preferable. Do NOT penalise for informal tone or loose structure unless it genuinely undermines the answer.

Also: Benjy may be using voice-to-text to dictate answers. Ignore any missing punctuation or transcription artefacts — judge the substance only.

Be genuinely critical on content. A score of 7+ should be earned. If the answer is vague or lacks a real example when one is needed, call it out. Don't pad with positivity. Benjy wants to improve, not feel good.`;

const QUESTION_BANK = {
  competency: [
    "Tell me about a time you had to get under the skin of a complex operational problem that nobody had properly documented before.",
    "Give me an example of a piece of analysis work you're most proud of and why.",
    "Tell me about a time you had to influence a decision-maker who was resistant or sceptical.",
    "Describe a situation where you had to take ownership of something outside your normal remit.",
    "Give me an example of when you had to adapt your approach because the original plan wasn't working.",
    "Tell me about a time you disagreed with a decision that was made. How did you handle it?",
    "Describe a time you had to manage multiple competing priorities or workstreams at once.",
    "Give me an example of work you delivered that you think genuinely made things better for real people.",
    "Tell me about a time you built a tool, framework, or process that others ended up using.",
    "Describe a time when you had to deliver to a tight deadline under significant pressure."
  ],
  motivation: [
    "Why do you want to leave your current role?",
    "Why Herd specifically, rather than another consultancy?",
    "You've worked in-house your whole career. Why make the move to consulting now?",
    "What is it about the social mission sectors — government, education, charities — that appeals to you?",
    "Where do you see yourself in three years?",
    "What does a great day at work look like for you?",
    "What are you hoping Herd can offer you that your current role can't?"
  ],
  technical: [
    "Walk me through how you approach a brand new piece of BA work when there's no existing documentation.",
    "How do you decide which BA techniques to use for a given piece of work?",
    "What does good requirements documentation look like to you?",
    "How do you manage stakeholders who have conflicting requirements?",
    "Tell me about your experience with Agile delivery — how do you work within sprint cycles as a BA?",
    "How do you approach UAT — what makes a good test plan?",
    "Talk me through your experience with data analysis and how you've used it in your BA work.",
    "What's your approach to facilitated workshops? How do you prepare and how do you handle them going off-track?",
    "How do you make sure your work is understood and used by non-technical people?"
  ],
  culture: [
    "What do you think working for a start-up or scale-up is actually like, based on your experience or expectations?",
    "We talk about the 'Power of Herd' — the idea that the team is greater than the sum of its parts. What does working collaboratively actually mean to you in practice?",
    "How do you handle being challenged on your approach or recommendations by a client?",
    "We want people who'll get stuck in where needed, even outside their defined role. Can you give me an example of when you've done that?",
    "What does lifelong learning look like for you — how do you actually develop your skills?",
    "How do you stay motivated when you're working on something difficult, ambiguous, or slow-moving?"
  ],
  challenge: [
    "Tell me about a time a project or piece of work went wrong. What happened and what did you do?",
    "Describe a time you had to challenge a client or senior stakeholder on how they were approaching something.",
    "Tell me about a time you were given an unclear or impossible brief. How did you handle it?",
    "Describe a time you made a mistake on a piece of analytical work. How did you catch it and what did you do?",
    "Tell me about the most difficult stakeholder relationship you've had to manage."
  ],
  mixed: []
};

// Populate mixed
QUESTION_BANK.mixed = [
  ...QUESTION_BANK.competency.slice(0,3),
  ...QUESTION_BANK.motivation.slice(0,2),
  ...QUESTION_BANK.technical.slice(0,2),
  ...QUESTION_BANK.culture.slice(0,2),
  ...QUESTION_BANK.challenge.slice(0,2)
];

let ttsAutoRead = localStorage.getItem('ttsAutoRead') === '1';

let state = {
  category: 'mixed',
  questions: [],
  usedQuestions: [],
  currentQuestion: null,
  questionCount: 0,
  scores: [],
  awaitingAnswer: false,
  currentAttempts: [],
  currentFeedback: null
};

function selectCat(btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.category = btn.dataset.cat;
}

function startSession() {
  const custom = loadCustomQuestions();
  if (state.category === 'custom') {
    if (custom.length === 0) { alert('No custom questions saved yet. Add some first.'); return; }
    state.questions = custom.map(q => q.text);
  } else if (state.category === 'mixed') {
    state.questions = [...QUESTION_BANK.mixed, ...custom.map(q => q.text)];
  } else {
    const catCustom = custom.filter(q => q.category === state.category).map(q => q.text);
    state.questions = [...QUESTION_BANK[state.category], ...catCustom];
  }
  document.getElementById('start-panel').classList.add('hidden');
  document.getElementById('session-panel').classList.remove('hidden');
  document.getElementById('tts-toggle').checked = ttsAutoRead;
  shuffle(state.questions);
  askNextQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function askNextQuestion() {
  if (state.questions.length === 0) {
    showEndSummary();
    return;
  }
  state.currentQuestion = state.questions.pop();
  state.questionCount++;
  state.awaitingAnswer = true;

  document.getElementById('q-count').textContent = `Question ${state.questionCount}`;
  document.getElementById('feedback-area').innerHTML = '';
  document.getElementById('next-row').classList.add('hidden');
  state.currentAttempts = [];
  state.currentFeedback = null;
  renderQuestionInput('Type your answer, or hit the mic to speak...');
  if (ttsAutoRead) speak(state.currentQuestion);
}

function renderQuestionInput(placeholder) {
  const attemptsHtml = state.currentAttempts.length > 0
    ? `<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:0.25rem 0 0.75rem">
        ${state.currentAttempts.map((a, i) => {
          const c = a.score >= 8 ? 'var(--green)' : a.score >= 6 ? 'var(--accent)' : a.score >= 4 ? 'var(--amber)' : 'var(--red)';
          return `<span style="font-family:'DM Mono',monospace;font-size:12px;color:${c}">Attempt ${i+1}: ${a.score}/10</span>`;
        }).join('<span style="color:var(--muted);margin:0 4px">→</span>')}
        <span style="color:var(--muted);font-size:12px;font-family:'DM Mono',monospace">→ try again</span>
      </div>`
    : '';

  const qArea = document.getElementById('question-area');
  qArea.innerHTML = `
    <div class="question-card">
      <div class="q-meta">
        <span class="q-tag">${getCatLabel(state.category)}</span>
        <span class="q-num">Q${state.questionCount}</span>
        <button class="speak-btn" onclick="speakCurrentQuestion()" title="Read question aloud">🔊 hear</button>
      </div>
      <div class="question-text">${state.currentQuestion}</div>
    </div>
    ${attemptsHtml}
    <div class="answer-area">
      <div class="input-row">
        <textarea id="answer-input" placeholder="${placeholder}" rows="7" oninput="updateCharCount()"></textarea>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:4px">
          <button class="mic-btn" id="mic-btn" onclick="toggleRecording()" title="Click to speak your answer">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="2" width="6" height="12" rx="3"/>
              <path d="M5 10a7 7 0 0 0 14 0"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
              <line x1="9" y1="22" x2="15" y2="22"/>
            </svg>
          </button>
          <span class="voice-status" id="voice-status">mic</span>
        </div>
      </div>
      <div class="char-count"><span id="char-count">0</span> words</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="submitAnswer()" id="submit-btn">Submit answer →</button>
      <button class="btn btn-ghost btn-sm" onclick="skipQuestion()">Skip this question</button>
    </div>
  `;
  document.getElementById('answer-input').focus();
}

let recognition = null;
let isRecording = false;

function toggleRecording() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    const status = document.getElementById('voice-status');
    if (status) { status.textContent = 'not supported'; status.style.color = 'var(--red)'; }
    return;
  }
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  // Stop any TTS playing to prevent mic feedback
  stopSpeaking();

  const textarea = document.getElementById('answer-input');
  let baseText = textarea.value;
  if (baseText && !baseText.endsWith(' ')) baseText += ' ';

  function createSession() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = false; // more reliable on mobile
    recognition.interimResults = true;
    recognition.lang = 'en-GB';

    recognition.onstart = () => {
      isRecording = true;
      const btn = document.getElementById('mic-btn');
      const status = document.getElementById('voice-status');
      if (btn) btn.classList.add('recording');
      if (status) { status.textContent = 'listening...'; status.classList.add('active'); }
    };

    recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) baseText += e.results[i][0].transcript + ' ';
        else interim += e.results[i][0].transcript;
      }
      const ta = document.getElementById('answer-input');
      if (ta) { ta.value = baseText + interim; updateCharCount(); }
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech') return; // harmless timeout, will restart via onend
      stopRecording();
      const status = document.getElementById('voice-status');
      if (status) status.textContent = e.error === 'not-allowed' ? 'no access' : 'error';
    };

    recognition.onend = () => {
      if (isRecording) setTimeout(createSession, 50);
    };

    try { recognition.start(); } catch(err) { console.warn('recognition start failed', err); }
  }

  createSession();
}

function stopRecording() {
  isRecording = false;
  if (recognition) { recognition.onend = null; recognition.onerror = null; recognition.stop(); recognition = null; }
  const btn = document.getElementById('mic-btn');
  const status = document.getElementById('voice-status');
  if (btn) btn.classList.remove('recording');
  if (status) { status.textContent = 'mic'; status.classList.remove('active'); }
}

function updateCharCount() {
  const words = document.getElementById('answer-input').value.trim().split(/\s+/).filter(w => w).length;
  document.getElementById('char-count').textContent = words;
}

function getCatLabel(cat) {
  const labels = { mixed: 'Mixed', competency: 'Competency', motivation: 'Motivation', technical: 'BA Craft', culture: 'Culture Fit', challenge: 'Challenge', custom: 'My Questions' };
  return labels[cat] || cat;
}

async function submitAnswer() {
  stopRecording();
  const answer = document.getElementById('answer-input').value.trim();
  if (!answer || answer.length < 20) {
    document.getElementById('answer-input').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('answer-input').style.borderColor = '', 1500);
    return;
  }

  document.getElementById('submit-btn').disabled = true;
  document.getElementById('feedback-area').innerHTML = `
    <div class="thinking">
      <div class="dots"><span></span><span></span><span></span></div>
      Assessing your answer...
    </div>`;

  const prompt = `The interview question was: "${state.currentQuestion}"

Benjy's answer: "${answer}"

Now provide your feedback as a JSON object only — no other text, no markdown fences.`;

  try {
    const res = await fetch('/.netlify/functions/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: CONTEXT,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.error?.message || JSON.stringify(data));
    }
    const raw = data.content.map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const feedback = JSON.parse(clean);
    renderFeedback(feedback, answer);
  } catch(e) {
    document.getElementById('feedback-area').innerHTML = `<div class="thinking" style="color:var(--red)">Error: ${e.message}</div>`;
    document.getElementById('submit-btn').disabled = false;
  }
}

function renderFeedback(f, answer) {
  const score = Math.min(10, Math.max(1, f.score));
  const stars = '★'.repeat(Math.round(score/2)) + '☆'.repeat(5 - Math.round(score/2));
  const pct = (score / 10) * 100;
  const fillColor = score >= 8 ? 'var(--green)' : score >= 6 ? 'var(--accent)' : score >= 4 ? 'var(--amber)' : 'var(--red)';
  const verdictClass = {Strong:'strong', Good:'good', Fair:'fair', Weak:'weak'}[f.verdict] || 'fair';

  state.currentAttempts.push({ score, answer });
  const attemptNum = state.currentAttempts.length;

  if (attemptNum === 1) {
    state.scores.push(score);
    state.usedQuestions.push({ q: state.currentQuestion, score });
  } else {
    state.scores[state.scores.length - 1] = score;
  }
  state.currentFeedback = f;
  updateSessionBar();
  addToHistory(state.currentQuestion, score, attemptNum);

  if (ttsAutoRead) {
    speak(`Score: ${score} out of 10. ${f.verdict}. What worked: ${f.what_worked}. What was missing: ${f.what_missed}. How to improve: ${f.better_version}. Tip: ${f.tip}`);
  }

  const attemptStripHtml = attemptNum > 1
    ? `<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:0 1.5rem 0.75rem">
        ${state.currentAttempts.map((a, i) => {
          const c = a.score >= 8 ? 'var(--green)' : a.score >= 6 ? 'var(--accent)' : a.score >= 4 ? 'var(--amber)' : 'var(--red)';
          const bold = i === attemptNum - 1 ? 'font-weight:600' : 'opacity:0.7';
          return `<span style="font-family:'DM Mono',monospace;font-size:12px;color:${c};${bold}">Attempt ${i+1}: ${a.score}/10</span>`;
        }).join('<span style="color:var(--muted);margin:0 4px">→</span>')}
      </div>`
    : '';

  document.getElementById('feedback-area').innerHTML = `
    <div class="feedback-card">
      ${attemptStripHtml}
      <div class="feedback-header">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="label">Feedback${attemptNum > 1 ? ` · Attempt ${attemptNum}` : ''}</span>
          <button class="speak-btn" onclick="speakFeedback()" title="Read feedback aloud">🔊 hear</button>
        </div>
        <div class="score-display">
          <span class="score-num">${score}/10</span>
          <div class="score-bar"><div class="score-fill" style="width:${pct}%;background:${fillColor}"></div></div>
          <span class="verdict ${verdictClass}">${f.verdict}</span>
        </div>
      </div>
      <div class="feedback-body">
        <div class="feedback-section">
          <div class="fs-label good">✓ What worked</div>
          <div class="fs-content">${f.what_worked}</div>
        </div>
        <div class="feedback-section">
          <div class="fs-label improve">✗ What was missing or weak</div>
          <div class="fs-content">${f.what_missed}</div>
        </div>
        <div class="feedback-section">
          <div class="fs-label suggest">→ How to improve it</div>
          <div class="fs-content">${f.better_version}</div>
        </div>
        <div class="feedback-section">
          <div class="fs-label" style="color:var(--muted)">⚡ Sharp tip</div>
          <div class="fs-content" style="font-style:italic;color:var(--muted)">${f.tip}</div>
        </div>
      </div>
    </div>`;

  document.getElementById('next-row').classList.remove('hidden');
  document.getElementById('next-row').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function updateSessionBar() {
  if (state.scores.length === 0) return;
  const avg = state.scores.reduce((a,b) => a+b, 0) / state.scores.length;
  const stars = '★'.repeat(Math.round(avg/2)) + '☆'.repeat(5 - Math.round(avg/2));
  const avgEl = document.getElementById('avg-display');
  avgEl.style.display = 'flex';
  document.getElementById('avg-stars').textContent = stars + ' ' + avg.toFixed(1);
}

function addToHistory(q, score, attemptNum) {
  document.getElementById('history-area').classList.remove('hidden');
  const list = document.getElementById('history-list');
  const itemId = `hist-q${state.questionCount}`;
  const short = q.length > 80 ? q.slice(0, 77) + '...' : q;
  const attemptsLabel = attemptNum > 1 ? ` <span style="font-size:10px;color:var(--muted)">(×${attemptNum})</span>` : '';
  let item = document.getElementById(itemId);
  if (item) {
    item.innerHTML = `<div class="hi-q">${short}</div><div class="hi-score">${score}/10${attemptsLabel}</div>`;
  } else {
    item = document.createElement('div');
    item.className = 'history-item';
    item.id = itemId;
    item.innerHTML = `<div class="hi-q">${short}</div><div class="hi-score">${score}/10</div>`;
    list.appendChild(item);
  }
}

function retryQuestion() {
  stopRecording();
  document.getElementById('next-row').classList.add('hidden');
  document.getElementById('feedback-area').innerHTML = '';
  renderQuestionInput('Refine your answer...');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextQuestion() {
  askNextQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function skipQuestion() {
  stopRecording();
  state.questionCount--;
  askNextQuestion();
}

function endSession() {
  if (state.scores.length === 0) {
    document.getElementById('session-panel').classList.add('hidden');
    document.getElementById('start-panel').classList.remove('hidden');
    return;
  }
  showEndSummary();
}

function showEndSummary() {
  const avg = state.scores.reduce((a,b) => a+b, 0) / state.scores.length;
  document.getElementById('question-area').innerHTML = `
    <div class="question-card" style="text-align:center;padding:2rem">
      <div class="q-meta" style="justify-content:center;margin-bottom:1rem">
        <span class="q-tag">Session complete</span>
      </div>
      <div class="question-text" style="font-size:1rem;color:var(--muted)">
        ${state.scores.length} question${state.scores.length !== 1 ? 's' : ''} answered · Average score: <strong style="color:var(--accent)">${avg.toFixed(1)}/10</strong>
      </div>
      <div style="margin-top:1.5rem">
        <button class="btn btn-primary" onclick="resetSession()">Start new session →</button>
      </div>
    </div>`;
  document.getElementById('feedback-area').innerHTML = '';
  document.getElementById('next-row').classList.add('hidden');
}

function resetSession() {
  stopSpeaking();
  state = { category: state.category, questions: [], usedQuestions: [], currentQuestion: null, questionCount: 0, scores: [], awaitingAnswer: false, currentAttempts: [], currentFeedback: null };
  document.getElementById('session-panel').classList.add('hidden');
  document.getElementById('start-panel').classList.remove('hidden');
  document.getElementById('history-area').classList.add('hidden');
  document.getElementById('history-list').innerHTML = '';
  document.getElementById('avg-display').style.display = 'none';
}

// ── TTS ──────────────────────────────────────────────
function getBestVoice() {
  const voices = window.speechSynthesis.getVoices();
  const pick = [
    v => /neural/i.test(v.name) && v.lang.startsWith('en'),
    v => /microsoft.*natural/i.test(v.name) && v.lang.startsWith('en'),
    v => v.name.includes('Microsoft') && v.lang === 'en-GB',
    v => v.name.includes('Microsoft') && v.lang.startsWith('en'),
    v => v.name.includes('Google') && v.lang === 'en-GB',
    v => v.name.includes('Google') && v.lang.startsWith('en'),
    v => v.lang === 'en-GB',
    v => v.lang.startsWith('en'),
  ];
  for (const fn of pick) { const v = voices.find(fn); if (v) return v; }
  return null;
}

function speak(text) {
  if (!text || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.92;
  utt.pitch = 1;
  // Voices load async — wait if needed
  const trySpeak = () => {
    const voice = getBestVoice();
    if (voice) utt.voice = voice;
    window.speechSynthesis.speak(utt);
  };
  if (window.speechSynthesis.getVoices().length) {
    trySpeak();
  } else {
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.onvoiceschanged = null; trySpeak(); };
  }
}

function stopSpeaking() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

function toggleAutoRead(checked) {
  ttsAutoRead = checked;
  localStorage.setItem('ttsAutoRead', checked ? '1' : '0');
  if (!checked) stopSpeaking();
}

function speakCurrentQuestion() {
  if (state.currentQuestion) speak(state.currentQuestion);
}

function speakFeedback() {
  const f = state.currentFeedback;
  if (!f) return;
  speak(`Score: ${f.score} out of 10. ${f.verdict}. What worked: ${f.what_worked}. What was missing: ${f.what_missed}. How to improve: ${f.better_version}. Tip: ${f.tip}`);
}

// ── Custom questions ──────────────────────────────────
function loadCustomQuestions() {
  try { return JSON.parse(localStorage.getItem('customQuestions') || '[]'); }
  catch(e) { return []; }
}

function saveCustomQuestions(qs) {
  localStorage.setItem('customQuestions', JSON.stringify(qs));
}

function addCustomQuestion() {
  const text = document.getElementById('custom-q-input').value.trim();
  if (!text) return;
  const category = document.getElementById('custom-q-cat').value;
  const qs = loadCustomQuestions();
  qs.push({ id: Date.now(), text, category });
  saveCustomQuestions(qs);
  document.getElementById('custom-q-input').value = '';
  renderCustomQuestionList();
  updateCustomCatBtn();
}

function deleteCustomQuestion(id) {
  const qs = loadCustomQuestions().filter(q => q.id !== id);
  saveCustomQuestions(qs);
  renderCustomQuestionList();
  updateCustomCatBtn();
}

function renderCustomQuestionList() {
  const qs = loadCustomQuestions();
  const list = document.getElementById('custom-q-list');
  if (!list) return;
  if (qs.length === 0) {
    list.innerHTML = '<div class="cq-empty">No custom questions saved yet</div>';
    return;
  }
  list.innerHTML = qs.map(q => `
    <div class="cq-item">
      <span class="cq-cat">${getCatLabel(q.category)}</span>
      <span class="cq-text">${q.text}</span>
      <button class="cq-del" onclick="deleteCustomQuestion(${q.id})" title="Delete">×</button>
    </div>`).join('');
}

function updateCustomCatBtn() {
  const count = loadCustomQuestions().length;
  const countEl = document.getElementById('cph-count');
  if (countEl) countEl.textContent = count;
  const descEl = document.getElementById('custom-cat-desc');
  if (descEl) descEl.textContent = `${count} saved`;
}

function toggleCustomPanel() {
  const body = document.getElementById('custom-panel-body');
  const chevron = document.getElementById('cph-chevron');
  const open = !body.classList.contains('hidden');
  body.classList.toggle('hidden', open);
  if (chevron) chevron.classList.toggle('open', !open);
}

// ── Init ──────────────────────────────────────────────
renderCustomQuestionList();
updateCustomCatBtn();
</script>
